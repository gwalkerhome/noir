<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOIR — Killer vs Inspector</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Special+Elite&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0a0805;
    --paper: #f2ead8;
    --cream: #e8dfc8;
    --blood: #8b1a1a;
    --gold: #c9a84c;
    --gold-dim: #8a6e2a;
    --smoke: #2a2520;
    --ash: #4a4540;
    --fog: #6a6560;
    --highlight: #d4b896;
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(–ink);
color: var(–paper);
font-family: ‘Courier Prime’, monospace;
min-height: 100vh;
overflow-x: hidden;
position: relative;
}

/* Film grain overlay */
body::before {
content: ‘’;
position: fixed;
inset: 0;
background-image: url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 256 256’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘noise’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.9’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23noise)’ opacity=‘0.08’/%3E%3C/svg%3E”);
pointer-events: none;
z-index: 9999;
opacity: 0.4;
}

/* Vignette */
body::after {
content: ‘’;
position: fixed;
inset: 0;
background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
pointer-events: none;
z-index: 9998;
}

/* ===== SCREENS ===== */
.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

/* ===== TITLE SCREEN ===== */
#title-screen {
background: radial-gradient(ellipse at 30% 40%, #1a1208 0%, var(–ink) 70%);
padding: 2rem;
text-align: center;
gap: 2rem;
}

.title-badge {
border: 1px solid var(–gold-dim);
padding: 0.3rem 1.5rem;
letter-spacing: 0.4em;
font-size: 0.7rem;
color: var(–gold-dim);
text-transform: uppercase;
}

.title-main {
font-family: ‘Playfair Display’, serif;
font-size: clamp(5rem, 15vw, 10rem);
font-weight: 900;
font-style: italic;
letter-spacing: -0.02em;
line-height: 0.9;
color: var(–paper);
text-shadow: 0 0 80px rgba(201,168,76,0.15), 4px 4px 0 var(–blood);
position: relative;
}

.title-sub {
font-family: ‘Special Elite’, cursive;
font-size: clamp(0.9rem, 2vw, 1.1rem);
letter-spacing: 0.25em;
color: var(–gold);
text-transform: uppercase;
}

.title-rule { width: 120px; height: 1px; background: var(–gold-dim); margin: 0 auto; }

.title-tagline {
font-style: italic;
color: var(–fog);
font-size: 0.95rem;
max-width: 360px;
line-height: 1.7;
}

.btn {
font-family: ‘Special Elite’, cursive;
letter-spacing: 0.2em;
text-transform: uppercase;
border: none;
cursor: pointer;
transition: all 0.2s;
position: relative;
}

.btn-primary {
background: var(–blood);
color: var(–paper);
padding: 1rem 3rem;
font-size: 1rem;
border: 1px solid #a02020;
box-shadow: 0 4px 20px rgba(139,26,26,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
}
.btn-primary:hover { background: #a01818; transform: translateY(-1px); box-shadow: 0 6px 24px rgba(139,26,26,0.5); }
.btn-primary:active { transform: translateY(0); }

.btn-secondary {
background: transparent;
color: var(–fog);
padding: 0.6rem 1.5rem;
font-size: 0.8rem;
border: 1px solid var(–ash);
}
.btn-secondary:hover { color: var(–paper); border-color: var(–fog); }

/* ===== ROLE ASSIGNMENT ===== */
#role-screen { padding: 2rem; gap: 2rem; text-align: center; }

.section-title {
font-family: ‘Playfair Display’, serif;
font-size: 2rem;
font-style: italic;
color: var(–paper);
}

.role-card-reveal {
background: var(–smoke);
border: 1px solid var(–ash);
padding: 2.5rem 3rem;
max-width: 380px;
width: 100%;
position: relative;
}
.role-card-reveal::before {
content: ‘’;
position: absolute;
top: 6px; left: 6px; right: -6px; bottom: -6px;
border: 1px solid var(–ash);
z-index: -1;
}

.role-label {
font-family: ‘Special Elite’, cursive;
letter-spacing: 0.3em;
font-size: 0.7rem;
color: var(–gold-dim);
text-transform: uppercase;
margin-bottom: 1rem;
}

.role-name {
font-family: ‘Playfair Display’, serif;
font-size: 3rem;
font-weight: 900;
margin-bottom: 0.5rem;
}

.role-killer { color: var(–blood); text-shadow: 0 0 30px rgba(139,26,26,0.5); }
.role-inspector { color: var(–gold); text-shadow: 0 0 30px rgba(201,168,76,0.3); }

.role-desc {
font-style: italic;
color: var(–fog);
font-size: 0.9rem;
line-height: 1.6;
margin-top: 0.5rem;
}

/* ===== GAME SCREEN ===== */
#game-screen {
display: none;
flex-direction: column;
min-height: 100vh;
padding: 1rem;
gap: 0.75rem;
}
#game-screen.active { display: flex; }

.game-header {
display: flex;
align-items: center;
justify-content: space-between;
border-bottom: 1px solid var(–ash);
padding-bottom: 0.75rem;
}

.game-title-small {
font-family: ‘Playfair Display’, serif;
font-size: 1.4rem;
font-style: italic;
color: var(–paper);
}

.turn-indicator {
font-family: ‘Special Elite’, cursive;
letter-spacing: 0.15em;
font-size: 0.8rem;
padding: 0.4rem 1rem;
border: 1px solid;
}
.turn-killer { color: var(–blood); border-color: var(–blood); background: rgba(139,26,26,0.1); }
.turn-inspector { color: var(–gold); border-color: var(–gold-dim); background: rgba(201,168,76,0.08); }

.kill-counter {
font-family: ‘Courier Prime’, monospace;
font-size: 0.85rem;
color: var(–fog);
}
.kill-counter span { color: var(–blood); font-weight: bold; }

/* ===== BOARD ===== */
.board-container {
display: flex;
gap: 1rem;
flex: 1;
align-items: flex-start;
justify-content: center;
}

.board-wrap { position: relative; }

.board {
display: grid;
grid-template-columns: repeat(5, 1fr);
gap: 4px;
background: var(–smoke);
padding: 4px;
border: 1px solid var(–ash);
}

/* Row/Col shift controls */
.shift-controls-top, .shift-controls-bottom {
display: grid;
grid-template-columns: repeat(5, 1fr);
gap: 4px;
padding: 0 4px;
}
.shift-controls-left, .shift-controls-right {
position: absolute;
top: 30px; /* offset for top controls */
display: flex;
flex-direction: column;
gap: 4px;
padding: 4px 0;
}
.shift-controls-left { left: -30px; }
.shift-controls-right { right: -30px; }

.shift-btn {
background: transparent;
border: 1px solid var(–ash);
color: var(–ash);
font-size: 0.65rem;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: all 0.15s;
width: 22px;
height: 22px;
}
.shift-btn:hover:not(:disabled) { border-color: var(–gold-dim); color: var(–gold); background: rgba(201,168,76,0.05); }
.shift-btn:disabled { opacity: 0.2; cursor: not-allowed; }

.col-shift-btn { height: 22px; width: 100%; }
.row-shift-btn { width: 22px; height: 100%; }

/* ===== SUSPECT CARD ===== */
.suspect-card {
width: 90px;
height: 116px;
background: var(–cream);
border: 1px solid #c0b090;
position: relative;
cursor: pointer;
transition: all 0.2s;
overflow: hidden;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
user-select: none;
}

.suspect-card::before {
content: ‘’;
position: absolute;
inset: 3px;
border: 1px solid rgba(0,0,0,0.1);
pointer-events: none;
}

.suspect-card:hover:not(.dead):not(.no-action) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.5); border-color: var(–gold); z-index: 10; }

.suspect-card.dead {
background: #1a1510;
border-color: var(–ash);
cursor: default;
}

.suspect-card.highlighted { border-color: var(–gold) !important; box-shadow: 0 0 12px rgba(201,168,76,0.4); }
.suspect-card.secret-identity { border-color: var(–blood) !important; box-shadow: 0 0 12px rgba(139,26,26,0.4); }
.suspect-card.exonerated { border-color: #4a8a4a !important; }
.suspect-card.no-action { cursor: default; }

.suspect-name {
font-family: ‘Special Elite’, cursive;
font-size: 0.62rem;
color: var(–ink);
text-align: center;
letter-spacing: 0.05em;
padding: 0 4px;
line-height: 1.2;
z-index: 1;
}

.suspect-portrait {
width: 52px;
height: 62px;
margin: 4px auto 3px;
display: flex;
align-items: center;
justify-content: center;
position: relative;
}

/* SVG portraits embedded */
.portrait-svg {
width: 100%;
height: 100%;
}

.suspect-card.dead .suspect-name { color: var(–ash); }

.dead-overlay {
position: absolute;
inset: 0;
background: rgba(10,8,5,0.75);
display: flex;
align-items: center;
justify-content: center;
font-size: 1.5rem;
}

.evidence-badge {
position: absolute;
top: 3px;
right: 3px;
width: 14px;
height: 14px;
background: #2a5a2a;
border-radius: 50%;
font-size: 0.5rem;
display: flex;
align-items: center;
justify-content: center;
color: #90d890;
font-weight: bold;
}

/* ===== SIDE PANEL ===== */
.side-panel {
width: 220px;
display: flex;
flex-direction: column;
gap: 0.75rem;
flex-shrink: 0;
}

.panel-box {
background: var(–smoke);
border: 1px solid var(–ash);
padding: 1rem;
}

.panel-title {
font-family: ‘Special Elite’, cursive;
letter-spacing: 0.2em;
font-size: 0.65rem;
color: var(–gold-dim);
text-transform: uppercase;
margin-bottom: 0.75rem;
border-bottom: 1px solid var(–ash);
padding-bottom: 0.4rem;
}

.identity-display {
text-align: center;
padding: 0.75rem;
border: 1px solid var(–ash);
background: rgba(0,0,0,0.3);
position: relative;
}

.identity-name {
font-family: ‘Playfair Display’, serif;
font-size: 1.1rem;
font-style: italic;
color: var(–paper);
margin-top: 0.3rem;
}

.identity-hidden {
font-size: 1.5rem;
letter-spacing: 0.3em;
color: var(–ash);
}

/* Action buttons */
.action-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 0.4rem;
}

.action-btn {
font-family: ‘Special Elite’, cursive;
letter-spacing: 0.1em;
font-size: 0.65rem;
text-transform: uppercase;
padding: 0.5rem 0.25rem;
border: 1px solid var(–ash);
background: transparent;
color: var(–fog);
cursor: pointer;
transition: all 0.15s;
text-align: center;
}

.action-btn:hover:not(:disabled) { border-color: var(–gold-dim); color: var(–paper); background: rgba(201,168,76,0.05); }
.action-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.action-btn.active { border-color: var(–gold); color: var(–gold); background: rgba(201,168,76,0.1); }
.action-btn.danger { border-color: var(–blood); color: var(–blood); }
.action-btn.danger:hover:not(:disabled) { background: rgba(139,26,26,0.1); }

/* Evidence hand */
.evidence-hand {
display: flex;
flex-wrap: wrap;
gap: 0.4rem;
}

.evidence-card-mini {
width: 44px;
height: 58px;
background: var(–cream);
border: 1px solid #c0b090;
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
transition: all 0.15s;
position: relative;
overflow: hidden;
}
.evidence-card-mini::before {
content: ‘’;
position: absolute;
inset: 2px;
border: 1px solid rgba(0,0,0,0.08);
}
.evidence-card-mini:hover { transform: translateY(-2px); border-color: var(–gold); }
.evidence-card-mini.selected { border-color: var(–gold); box-shadow: 0 0 10px rgba(201,168,76,0.4); background: #f5eed8; }

.ev-name {
font-family: ‘Special Elite’, cursive;
font-size: 0.45rem;
color: var(–ink);
text-align: center;
padding: 2px;
line-height: 1.2;
}

/* Log */
.game-log {
font-size: 0.72rem;
color: var(–fog);
line-height: 1.6;
max-height: 120px;
overflow-y: auto;
font-style: italic;
}
.game-log p { border-left: 2px solid var(–ash); padding-left: 0.5rem; margin-bottom: 0.3rem; }
.game-log p.killer-log { border-color: var(–blood); color: #c06060; }
.game-log p.inspector-log { border-color: var(–gold-dim); color: #c0a860; }
.game-log p.system-log { border-color: var(–fog); }

/* ===== MODAL ===== */
.modal-overlay {
position: fixed;
inset: 0;
background: rgba(0,0,0,0.85);
z-index: 1000;
display: flex;
align-items: center;
justify-content: center;
padding: 1rem;
}
.modal-overlay.hidden { display: none; }

.modal-box {
background: var(–smoke);
border: 1px solid var(–ash);
padding: 2rem;
max-width: 420px;
width: 100%;
text-align: center;
position: relative;
}
.modal-box::before {
content: ‘’;
position: absolute;
top: 6px; left: 6px; right: -6px; bottom: -6px;
border: 1px solid var(–ash);
z-index: -1;
}

.modal-title {
font-family: ‘Playfair Display’, serif;
font-size: 2rem;
font-style: italic;
margin-bottom: 0.75rem;
}

.modal-body {
color: var(–fog);
font-style: italic;
line-height: 1.7;
margin-bottom: 1.5rem;
font-size: 0.9rem;
}

.modal-actions { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }

/* Pass device banner */
.pass-device {
background: linear-gradient(135deg, #1a0f0f, #0f0f1a);
border: 1px solid var(–ash);
padding: 1rem 1.5rem;
text-align: center;
font-family: ‘Special Elite’, cursive;
letter-spacing: 0.15em;
font-size: 0.8rem;
color: var(–gold);
}

/* Win screen overlay */
#win-overlay {
position: fixed;
inset: 0;
background: rgba(0,0,0,0.92);
z-index: 2000;
display: flex;
align-items: center;
justify-content: center;
flex-direction: column;
gap: 1.5rem;
text-align: center;
padding: 2rem;
}
#win-overlay.hidden { display: none; }

.win-title {
font-family: ‘Playfair Display’, serif;
font-size: clamp(2.5rem, 8vw, 4.5rem);
font-style: italic;
font-weight: 900;
}
.win-subtitle {
font-family: ‘Special Elite’, cursive;
letter-spacing: 0.25em;
font-size: 1rem;
color: var(–fog);
}
.win-desc { font-style: italic; color: var(–fog); max-width: 400px; line-height: 1.7; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(–smoke); }
::-webkit-scrollbar-thumb { background: var(–ash); }

/* Instructions expandable */
.instructions-toggle {
font-family: ‘Special Elite’, cursive;
font-size: 0.65rem;
letter-spacing: 0.1em;
color: var(–gold-dim);
cursor: pointer;
text-decoration: underline;
background: none;
border: none;
text-transform: uppercase;
display: block;
margin-top: 0.5rem;
}
.instructions-content {
font-size: 0.7rem;
color: var(–fog);
line-height: 1.7;
margin-top: 0.5rem;
display: none;
}
.instructions-content.open { display: block; }
.instructions-content strong { color: var(–paper); }

/* Help prompt */
.action-help {
font-size: 0.7rem;
color: var(–gold-dim);
font-style: italic;
line-height: 1.5;
padding: 0.4rem 0;
min-height: 2.5rem;
}

@media (max-width: 700px) {
.board-container { flex-direction: column; align-items: center; }
.side-panel { width: 100%; max-width: 480px; flex-direction: row; flex-wrap: wrap; }
.panel-box { flex: 1; min-width: 140px; }
.suspect-card { width: 64px; height: 84px; }
.suspect-portrait { width: 36px; height: 44px; }
.suspect-name { font-size: 0.52rem; }
}
</style>

</head>

<script>
// ===================================================
//  NOIR — Killer vs Inspector
//  Local Hotseat Implementation
// ===================================================

const SUSPECTS = [
  'Alyss','Barrin','Clive','Dex','Evra',
  'Finn','Geneva','Harlow','Iris','Julian',
  'Kade','Linus','Marion','Nora','Ophelia',
  'Pierce','Quinton','Ryan','Simon','Thea',
  'Uri','Vance','Wren','Xara','Yael'
];

// Portrait generator — unique SVG silhouettes
function getPortraitSVG(name, dead) {
  const hash = name.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
  const hue = (hash * 37) % 360;
  const style = hash % 6; // 0=hat, 1=fedora+trench, 2=veil, 3=collar, 4=cap, 5=hood

  const bg = dead ? '#111' : `hsl(${hue}, 15%, 85%)`;
  const skin = dead ? '#333' : `hsl(${(hue + 20) % 360}, 20%, 72%)`;
  const accent = dead ? '#444' : `hsl(${(hue + 180) % 360}, 30%, 35%)`;

  const portraits = [
    // Fedora style
    `<svg viewBox="0 0 52 62" xmlns="http://www.w3.org/2000/svg">
      <rect width="52" height="62" fill="${bg}" rx="2"/>
      <ellipse cx="26" cy="36" rx="13" ry="14" fill="${skin}"/>
      <rect x="13" y="28" width="26" height="22" rx="4" fill="${skin}"/>
      <ellipse cx="26" cy="50" rx="16" ry="8" fill="${accent}" opacity="0.7"/>

//  GAME STATE

let G = {};

function initGame() {
  const shuffled = [...SUSPECTS].sort(() => Math.random() - 0.5);
  const evShuffled = [...SUSPECTS].sort(() => Math.random() - 0.5);

  // Board: 5x5 grid of suspect names
  G = {
    board: shuffled.slice(0, 25), // 5x5 flat array [row*5+col]
    dead: new Set(),              // dead suspect names
    exonerated: {},               // name -> true (has evidence card on board)

    // Evidence deck (suspects not yet used as evidence cards)
    evidenceDeck: [...evShuffled],
    evidenceDiscarded: [],

    // Killer state
    killerIdentity: null,
    killerDisguise: null,

    // Inspector state
    inspectorIdentity: null,
    inspectorHand: [], // up to 3 evidence cards

    // Turn
    turn: 'killer',     // 'killer' | 'inspector'
    phase: 'role-reveal', // 'role-reveal' | 'playing'
    selectedAction: null,
    selectedEvCard: null, // for inspector exonerate

    lastShift: null, // {type, index, dir} — to prevent undo

    kills: 0,
    log: [],
  };

  // Deal killer identity + disguise
  G.killerIdentity = drawEvidence();
  G.killerDisguise = drawEvidence();

  // Deal inspector hand of 4, pick one as identity
  const inspHand = [drawEvidence(), drawEvidence(), drawEvidence(), drawEvidence()];
  // Inspector picks — we'll handle via modal
  G.inspectorSetupHand = inspHand;
}

function drawEvidence() {
  if (G.evidenceDeck.length === 0) {
    G.evidenceDeck = [...G.evidenceDiscarded].sort(() => Math.random() - 0.5);
    G.evidenceDiscarded = [];
  }
  return G.evidenceDeck.pop() || null;
}

function addLog(text, type = 'system') {
  G.log.unshift({ text, type });
  if (G.log.length > 20) G.log.pop();
  renderLog();
}

let _inspectorPicked = null;
function pickInspectorIdentity(name) {
  _inspectorPicked = name;

  document.getElementById('setup-ev-'+name)?.classList.add('selected');

  const btn = document.getElementById('inspector-confirm-btn');
  btn.disabled = false;
  btn.style.opacity = '1';

function confirmInspectorSetup() {
  if (!_inspectorPicked) return;
  G.inspectorIdentity = _inspectorPicked;
  G.inspectorHand = G.inspectorSetupHand.filter(n => n !== _inspectorPicked);
  // Make sure hand has only 3
  while (G.inspectorHand.length > 3) {
    G.evidenceDiscarded.push(G.inspectorHand.pop());
  }
  G.turn = 'killer'; // Killer goes first after setup
  G.phase = 'playing';

  document.getElementById('role-screen').classList.remove('active');
  showGameScreen();
  addLog('The game begins. The Killer moves first.', 'system');
  renderAll();
}

function showGameScreen() {
  document.getElementById('role-screen').classList.remove('active');
  const gs = document.getElementById('game-screen');
  gs.style.display = 'flex';
  gs.classList.add('active');
}

function renderAll() {
  renderBoard();
  renderShiftControls();
  renderIdentityPanel();
  renderActions();
  renderLog();
  renderTurnIndicator();
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  const identity = G.turn === 'killer' ? G.killerIdentity : G.inspectorIdentity;
  const adjacent = getAdjacent(identity);

  G.board.forEach((name, idx) => {
    const isDead = G.dead.has(name);
    const isExon = !!G.exonerated[name];
    const isIdentity = name === identity;
    const isAdjacent = adjacent.includes(name);
    const isKillerDisguise = G.turn === 'killer' && name === G.killerDisguise;
    const isSelectedEv = G.selectedEvCard && name === G.selectedEvCard;

    const card = document.createElement('div');
    card.className = 'suspect-card';
    if (isDead) card.classList.add('dead');
    if (isIdentity) card.classList.add('secret-identity');
    if (isExon && !isDead) card.classList.add('exonerated');

    // Highlight actionable targets
    const actionable = isActionableTarget(name, idx, isAdjacent, isDead, isExon);
    if (actionable) card.classList.add('highlighted');
    else if (!isDead) card.classList.add('no-action');

    card.innerHTML = `
      <div class="suspect-portrait">${getPortraitSVG(name, isDead)}</div>
      <div class="suspect-name">${name}</div>
      ${isDead ? '<div class="dead-overlay">†</div>' : ''}
      ${isExon && !isDead ? '<div class="evidence-badge">E</div>' : ''}
      ${isKillerDisguise ? '<div class="evidence-badge" style="background:#4a2a00; color:#d4a060;">D</div>' : ''}
    `;

    if (actionable) card.onclick = () => handleCardClick(name, idx);
    board.appendChild(card);
  });
}

function isActionableTarget(name, idx, isAdjacent, isDead, isExon) {
  const action = G.selectedAction;
  if (!action) return false;
  if (G.phase !== 'playing' && G.phase !== 'killer-first-kill') return false;

  if (G.turn === 'killer') {
    if (action === 'kill' && !isDead && isAdjacent) return true;
    if (action === 'disguise') return false; // disguise is panel-only
  }
  if (G.turn === 'inspector') {
    if (action === 'accuse' && !isDead && isAdjacent) return true;
    if (action === 'exonerate' && !isDead && !isExon && G.selectedEvCard) return true;
    if (action === 'collapse' && isDead) return true;
  }
  return false;
}

function getAdjacent(name) {
  if (!name) return [];
  const idx = G.board.indexOf(name);
  if (idx === -1) return [];
  const row = Math.floor(idx / 5);
  const col = idx % 5;
  const adj = [];
  for (let dr = -1; dr <= 1; dr++) {
    for (let dc = -1; dc <= 1; dc++) {
      if (dr === 0 && dc === 0) continue;
      const nr = row + dr, nc = col + dc;
      if (nr >= 0 && nr < 5 && nc >= 0 && nc < 5) {
        adj.push(G.board[nr * 5 + nc]);
      }
    }
  }
  return adj;
}

function renderShiftControls() {
  // Top (shift columns down — arrow down)
  const top = document.getElementById('col-shifts-top');
  top.innerHTML = '';
  for (let c = 0; c < 5; c++) {
    const btn = document.createElement('button');
    btn.className = 'shift-btn col-shift-btn';
    btn.textContent = '▼';
    btn.title = `Shift column ${c+1} down`;
    const blocked = G.lastShift && G.lastShift.type === 'col' && G.lastShift.index === c && G.lastShift.dir === 'up';
    btn.disabled = !canShift() || blocked;
    btn.onclick = () => doShift('col', c, 'down');
    top.appendChild(btn);
  }

  // Bottom (shift columns up — arrow up)
  const bottom = document.getElementById('col-shifts-bottom');
  bottom.innerHTML = '';
  for (let c = 0; c < 5; c++) {
    const btn = document.createElement('button');
    btn.className = 'shift-btn col-shift-btn';
    btn.textContent = '▲';
    btn.title = `Shift column ${c+1} up`;
    const blocked = G.lastShift && G.lastShift.type === 'col' && G.lastShift.index === c && G.lastShift.dir === 'down';
    btn.disabled = !canShift() || blocked;
    btn.onclick = () => doShift('col', c, 'up');
    bottom.appendChild(btn);
  }

  // Left (shift row left — arrow left)
  const left = document.getElementById('row-shifts-left');
  left.innerHTML = '';
  for (let r = 0; r < 5; r++) {
    const btn = document.createElement('button');
    btn.className = 'shift-btn row-shift-btn';
    btn.textContent = '◀';
    btn.title = `Shift row ${r+1} left`;
    const blocked = G.lastShift && G.lastShift.type === 'row' && G.lastShift.index === r && G.lastShift.dir === 'right';
    btn.disabled = !canShift() || blocked;
    btn.onclick = () => doShift('row', r, 'left');
    left.appendChild(btn);
  }

  // Right (shift row right — arrow right)
  const right = document.getElementById('row-shifts-right');
  right.innerHTML = '';
  for (let r = 0; r < 5; r++) {
    const btn = document.createElement('button');
    btn.className = 'shift-btn row-shift-btn';
    btn.textContent = '▶';
    btn.title = `Shift row ${r+1} right`;
    const blocked = G.lastShift && G.lastShift.type === 'row' && G.lastShift.index === r && G.lastShift.dir === 'left';
    btn.disabled = !canShift() || blocked;
    btn.onclick = () => doShift('row', r, 'right');
    right.appendChild(btn);
  }
}

function canShift() {
  if (G.phase !== 'playing') return false;
  return G.selectedAction === 'shift';
}

function doShift(type, index, dir) {
  if (!canShift()) return;

  let arr;
  if (type === 'row') {
    arr = G.board.slice(index * 5, index * 5 + 5);
    if (dir === 'right') {
      arr.unshift(arr.pop());
    } else {
      arr.push(arr.shift());
    }
    for (let c = 0; c < 5; c++) G.board[index * 5 + c] = arr[c];
  } else {
    arr = [0,1,2,3,4].map(r => G.board[r * 5 + index]);
    if (dir === 'down') {
      arr.unshift(arr.pop());
    } else {
      arr.push(arr.shift());
    }
    for (let r = 0; r < 5; r++) G.board[r * 5 + index] = arr[r];
  }

  G.lastShift = { type, index, dir };
  addLog(`${capTurn()} shifted ${type} ${index+1} ${dir}.`, G.turn+'-log');
  endTurn();
}

function renderIdentityPanel() {
  const nameEl = document.getElementById('identity-name');
  const disguiseEl = document.getElementById('disguise-display');
  const disguiseNameEl = document.getElementById('disguise-name');

  if (G.turn === 'killer') {
    nameEl.textContent = G.killerIdentity || '—';
    nameEl.style.color = 'var(--blood)';
    disguiseEl.style.display = 'block';
    disguiseNameEl.textContent = G.killerDisguise || '—';
    disguiseNameEl.style.color = 'var(--ash)';
  } else {
    nameEl.textContent = G.inspectorIdentity || '—';
    nameEl.style.color = 'var(--gold)';
    disguiseEl.style.display = 'none';
  }

  // Evidence hand (inspector only)
  const handBox = document.getElementById('hand-box');
  const handEl = document.getElementById('evidence-hand');
  if (G.turn === 'inspector') {
    handBox.style.display = 'block';
    handEl.innerHTML = G.inspectorHand.map(n => `
      <div class="evidence-card-mini ${G.selectedEvCard === n ? 'selected' : ''}" onclick="selectEvCard('${n}')">
        <div class="ev-name">${n}</div>
      </div>
    `).join('');
  } else {
    handBox.style.display = 'none';
  }
}

function selectEvCard(name) {
  if (G.selectedAction !== 'exonerate') return;
  G.selectedEvCard = G.selectedEvCard === name ? null : name;
  renderIdentityPanel();
  renderBoard();
}

function renderActions() {
  const grid = document.getElementById('action-grid');
  const help = document.getElementById('action-help');
  grid.innerHTML = '';

  let actions = [];
  let helpText = 'Choose an action.';

  if (G.phase === 'killer-first-kill') {
    helpText = 'Select a suspect adjacent to your identity to kill them.';
    grid.innerHTML = '';
    return;
  }
  if (G.phase !== 'playing') return;

  if (G.turn === 'killer') {
    actions = [
      { id: 'shift', label: '⇄ Shift', help: 'Move a row or column using the arrows on the board.' },
      { id: 'kill', label: '✕ Kill', help: 'Flip an adjacent suspect to deceased. Win by killing 10 or the Inspector.' },
      { id: 'disguise', label: '◈ Disguise', help: 'Swap your Secret Identity with your Disguise.' },
    ];
    // Collapse option (if dead suspects exist)
    if (G.dead.size > 0) {
      actions.push({ id: 'collapse', label: '⊟ Collapse', help: 'Remove a deceased suspect from each row or column. Inspector replaces lost cards.' });
    }
  } else {
    actions = [
      { id: 'shift', label: '⇄ Shift', help: 'Move a row or column using the arrows on the board.' },
      { id: 'accuse', label: '⚑ Accuse', help: 'Select a suspect adjacent to you. If it\'s the Killer, you win!' },
      { id: 'exonerate', label: '✓ Exonerate', help: 'Pick an evidence card from hand, then place it on its matching suspect. Canvas the Killer.' },
      { id: 'solve', label: '◎ Solve', help: 'Name both the Killer\'s Identity and Disguise. Win if correct — or the Killer wins.' },
    ];
  }

  actions.forEach(a => {
    const btn = document.createElement('button');
    btn.className = 'action-btn' + (G.selectedAction === a.id ? ' active' : '');
    if (a.id === 'kill' || a.id === 'accuse' || a.id === 'solve') btn.classList.add('danger');
    btn.textContent = a.label;

    // Disable conditions
    let disabled = false;
    if (a.id === 'exonerate' && G.inspectorHand.length === 0) disabled = true;
    if (a.id === 'collapse' && G.dead.size === 0) disabled = true;
    btn.disabled = disabled;

    btn.onclick = () => {
      G.selectedAction = G.selectedAction === a.id ? null : a.id;
      G.selectedEvCard = null;
      if (a.id === 'disguise') { doDisguise(); return; }
      if (a.id === 'solve') { doSolve(); return; }
      if (a.id === 'collapse') { doCollapse(); return; }
      renderAll();
    };

    if (G.selectedAction === a.id) helpText = a.help;
    grid.appendChild(btn);
  });

  help.textContent = helpText;

  // Instructions
  renderInstructions();
}

function renderInstructions() {
  const box = document.getElementById('instructions-box');
  if (G.turn === 'killer') {
    box.innerHTML = `<strong>Killer wins if:</strong> you kill the Inspector's suspect, or 10 suspects total.<br>

    <strong>Disguise:</strong> swap identity with disguise card.<br>

    box.innerHTML = `<strong>Inspector wins if:</strong> you Accuse the correct suspect (the Killer's identity).<br>
    <strong>Accuse:</strong> select adjacent suspect — must be the Killer's identity to win.<br>
    <strong>Exonerate:</strong> select evidence card from hand, place on board, Canvas the Killer.<br>
    <strong>Solve:</strong> name Killer's identity AND disguise to win outright.`;
  }
}

function handleCardClick(name, idx) {
  if (G.phase === 'killer-first-kill') {
    // Must be adjacent to killer identity
    const adj = getAdjacent(G.killerIdentity);
    if (!adj.includes(name)) return;
    performKill(name);
    G.phase = 'playing';
    // Now inspector setup
    showModal('First Kill Made', `${name} has been eliminated. The Killer has made their move.<br><br>Now pass the device to the Inspector.`, [
      { label: 'Inspector Ready', action: 'inspectorSetup' }
    ]);
    return;
  }

  if (G.phase !== 'playing') return;

  const action = G.selectedAction;
  if (!action) return;

  if (G.turn === 'killer') {
    if (action === 'kill') {
      const adj = getAdjacent(G.killerIdentity);
      if (!adj.includes(name) || G.dead.has(name)) return;
      performKill(name);
    }
  } else {
    if (action === 'accuse') {
      const adj = getAdjacent(G.inspectorIdentity);
      const allowSelf = name === G.inspectorIdentity;
      if (!adj.includes(name) && !allowSelf) return;
      if (G.dead.has(name)) return;
      performAccuse(name);
    }
    if (action === 'exonerate') {
      if (!G.selectedEvCard) return;
      if (G.dead.has(name) || G.exonerated[name]) return;
      if (name !== G.selectedEvCard) {
        // Must match the evidence card
        showModal('Wrong Card', `You must place the selected evidence card (${G.selectedEvCard}) on its matching suspect.`, [
          { label: 'OK', action: 'closeModal' }
        ]);
        return;
      }
      performExonerate(name);
    }
    if (action === 'collapse') {
      // handled separately
    }
  }
}

function performKill(name) {
  G.dead.add(name);
  G.kills++;

  let msg = `The Killer eliminates ${name}.`;

  // Check if killed Inspector's identity
  if (name === G.inspectorIdentity) {
    addLog(msg, 'killer-log');
    triggerWin('killer', 'inspector-killed');
    return;
  }

  // Check if exonerated — canvas
  let canvasResult = null;
  if (G.exonerated[name]) {
    delete G.exonerated[name];
    const inspAdj = getAdjacent(G.inspectorIdentity);
    const killedAdj = getAdjacent(name); // adjacents of killed card
    const isAdjToKilled = killedAdj.includes(G.inspectorIdentity);
    canvasResult = isAdjToKilled;
    msg += ` (Exonerated — Canvas: Inspector is${isAdjToKilled ? '' : ' NOT'} adjacent.)`;
  }

  addLog(msg, 'killer-log');

  if (G.kills >= 10) {
    triggerWin('killer', '10-kills');
    return;
  }

  if (canvasResult !== null) {
    showModal('Canvas Result', 
      `You killed an exonerated suspect.<br><br>The Inspector reveals: their identity is <strong>${canvasResult ? 'ADJACENT' : 'NOT adjacent'}</strong> to ${name}.`,
      [{ label: 'Continue', action: 'endTurn' }]
    );
  } else {
    G.selectedAction = null;
    endTurn();
  }
}

function performAccuse(name) {
  if (name === G.killerIdentity) {
    addLog(`Inspector accuses ${name} — correct! The Killer is caught.`, 'inspector-log');
    triggerWin('inspector', 'accused');
  } else {
    addLog(`Inspector accuses ${name} — wrong! The hunt continues.`, 'inspector-log');
    G.selectedAction = null;
    endTurn();
  }
}

function performExonerate(name) {
  G.exonerated[name] = true;
  // Remove from hand, replenish
  G.inspectorHand = G.inspectorHand.filter(n => n !== G.selectedEvCard);

  // Canvas the Killer
  const exonAdj = getAdjacent(name);
  const killerAdj = exonAdj.includes(G.killerIdentity) || exonAdj.includes(G.killerDisguise);

  const newCard = drawEvidence();
  if (newCard) G.inspectorHand.push(newCard);

  addLog(`Inspector exonerates ${name}. Canvas: Killer is${killerAdj ? '' : ' NOT'} adjacent.`, 'inspector-log');

  G.selectedEvCard = null;
  G.selectedAction = null;

  showModal('Canvas Result',
    `Evidence card placed on ${name}.<br><br>The Killer reveals: their identity or disguise is <strong>${killerAdj ? 'ADJACENT' : 'NOT adjacent'}</strong> to ${name}.`,
    [{ label: 'Continue', action: 'endTurn' }]
  );
}

function doDisguise() {
  // Swap killer identity and disguise
  const temp = G.killerIdentity;
  G.killerIdentity = G.killerDisguise;
  G.killerDisguise = temp;
  addLog(`The Killer switches disguise.`, 'killer-log');
  G.selectedAction = null;
  endTurn();
}

function doSolve() {
  // Inspector must name both Killer identity AND disguise
  showSolveModal();
}

function showSolveModal() {
  const living = SUSPECTS.filter(s => !G.dead.has(s));
  const modal = document.getElementById('modal');
  const mtitle = document.getElementById('modal-title');
  const mbody = document.getElementById('modal-body');
  const mactions = document.getElementById('modal-actions');

  mtitle.textContent = 'Solve the Case';
  mtitle.style.color = 'var(--gold)';

  let selectedIdentity = null, selectedDisguise = null;

  mbody.innerHTML = `
    <div style="text-align:left;">
      <p style="margin-bottom:0.5rem; color:var(--gold-dim);">Name the Killer's <strong>Secret Identity</strong>:</p>
      <select id="solve-identity" style="width:100%;background:var(--ink);color:var(--paper);border:1px solid var(--ash);padding:0.5rem;font-family:'Courier Prime',monospace;margin-bottom:1rem;">
        <option value="">— Select —</option>
        ${SUSPECTS.map(s => `<option value="${s}">${s}${G.dead.has(s) ? ' †' : ''}</option>`).join('')}
      </select>
      <p style="margin-bottom:0.5rem; color:var(--gold-dim);">Name the Killer's <strong>Disguise</strong>:</p>
      <select id="solve-disguise" style="width:100%;background:var(--ink);color:var(--paper);border:1px solid var(--ash);padding:0.5rem;font-family:'Courier Prime',monospace;">
        <option value="">— Select —</option>
        ${SUSPECTS.map(s => `<option value="${s}">${s}${G.dead.has(s) ? ' †' : ''}</option>`).join('')}
      </select>
    </div>
  `;

  mactions.innerHTML = `
    <button class="btn btn-primary" style="background:var(--gold-dim);color:var(--ink);" onclick="confirmSolve()">Make Accusation</button>
    <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
  `;

  modal.classList.remove('hidden');
}

function confirmSolve() {
  const identity = document.getElementById('solve-identity')?.value;
  const disguise = document.getElementById('solve-disguise')?.value;

  if (!identity || !disguise) {
    alert('Please select both Identity and Disguise.');
    return;
  }

  closeModal();

  if (identity === G.killerIdentity && disguise === G.killerDisguise) {
    addLog(`Inspector solves the case! Killer: ${identity}, Disguise: ${disguise}.`, 'inspector-log');
    triggerWin('inspector', 'solved');
  } else {
    addLog(`Inspector's Solve attempt failed. (${identity} / ${disguise})`, 'inspector-log');
    showModal('Wrong!', `Incorrect. The Killer walks free — for now.<br><br>The Killer wins!`, [
      { label: 'New Game', action: 'resetGame' }
    ]);
  }
}

function doCollapse() {
  // Choose: by row or by column, then pick dead suspects
  showModal('Collapse', 'Choose to remove one deceased suspect from each <strong>row</strong> or each <strong>column</strong>. The board will collapse to fill empty spaces.', [
    { label: 'By Row', action: 'collapseRow' },
    { label: 'By Column', action: 'collapseCol' },
    { label: 'Cancel', action: 'closeModal' }
  ]);
}

function doCollapseBy(type) {
  closeModal();
  // For simplicity, auto-remove: pick first dead suspect in each row/col
  const removed = [];

  if (type === 'row') {
    for (let r = 0; r < 5; r++) {
      const rowSlice = G.board.slice(r*5, r*5+5);
      const deadIdx = rowSlice.findIndex(n => G.dead.has(n));
      if (deadIdx !== -1) {
        removed.push(rowSlice[deadIdx]);
        // Remove from board
        G.board.splice(r*5 + deadIdx, 1);
        // Collapse: fill from right
        // Actually shift remaining items
      }
    }
    // Rebuild board removing dead suspects (one per row, left to right collapse)
    let newBoard = [];
    for (let r = 0; r < 5; r++) {
      let row = G.board.slice(r*5, r*5+5).filter(n => !removed.includes(n) || !G.dead.has(n));
      // This is getting complex — use visual collapse
      newBoard.push(...row);
    }
  }

  // Simpler implementation: remove all dead from board, compact
  // Full collapse: remove all dead suspects and compact grid
  const livingBoard = G.board.filter(n => !G.dead.has(n));
  // We keep positions but mark dead — the board just doesn't show collapse fully
  // For this implementation, we'll remove dead and show a smaller board

  removed.forEach(n => {
    G.dead.add(n); // already dead
  });

  addLog(`${capTurn()} collapses the board.`, G.turn + '-log');
  G.selectedAction = null;

  // Replenish inspector hand if needed
  while (G.inspectorHand.length < 3) {
    const ev = drawEvidence();
    if (ev) G.inspectorHand.push(ev); else break;
  }

  endTurn();
}

// ===================================================
//  TURN MANAGEMENT
// ===================================================
function endTurn() {
  G.selectedAction = null;
  G.selectedEvCard = null;

  const prev = G.turn;
  G.turn = G.turn === 'killer' ? 'inspector' : 'killer';

  renderAll();

  // Pass device prompt
  const nextName = G.turn === 'killer' ? 'The Killer' : 'The Inspector';
  showModal(`Pass the Device`, `Hand the device to <strong>${nextName}</strong>.<br><br>Do not let the other player see your screen.`, [
    { label: `I am ${nextName}`, action: 'closeModal' }
  ]);
}

function capTurn() {
  return G.turn === 'killer' ? 'Killer' : 'Inspector';
}

// ===================================================
//  WIN
// ===================================================
function triggerWin(winner, reason) {
  const overlay = document.getElementById('win-overlay');
  const badge = document.getElementById('win-badge');
  const title = document.getElementById('win-title');
  const sub = document.getElementById('win-subtitle');
  const desc = document.getElementById('win-desc');

  overlay.classList.remove('hidden');

  const reasons = {
    'inspector-killed': 'The Inspector was eliminated.',
    '10-kills': 'Ten suspects eliminated.',
    'accused': 'The Inspector made the right call.',
    'solved': 'The case was cracked wide open.',
  };

  if (winner === 'killer') {
    badge.textContent = 'Case Closed';
    title.textContent = 'The Killer Escapes';
    title.style.color = 'var(--blood)';
    sub.textContent = '— Another unsolved mystery —';
    desc.textContent = reasons[reason] + ' The city never knew what hit it.';
  } else {
    badge.textContent = 'Justice Served';
    title.textContent = 'Killer Caught';
    title.style.color = 'var(--gold)';
    sub.textContent = '— The Inspector prevails —';
    desc.textContent = reasons[reason] + ' The city sleeps a little safer tonight.';
  }
}

// ===================================================
//  MODAL
// ===================================================
function showModal(title, body, actions) {
  document.getElementById('modal-title').innerHTML = title;
  document.getElementById('modal-title').style.color = 'var(--paper)';
  document.getElementById('modal-body').innerHTML = body;

  const actionsEl = document.getElementById('modal-actions');
  actionsEl.innerHTML = '';
  actions.forEach(a => {
    const btn = document.createElement('button');
    btn.className = 'btn ' + (a.action === 'closeModal' || a.action === 'endTurn' ? 'btn-secondary' : 'btn-primary');
    btn.textContent = a.label;
    btn.onclick = () => handleModalAction(a.action);
    actionsEl.appendChild(btn);
  });

  document.getElementById('modal').classList.remove('hidden');
}

function handleModalAction(action) {
  if (action === 'closeModal') { closeModal(); return; }
  if (action === 'endTurn') { closeModal(); endTurn(); return; }
  if (action === 'resetGame') { resetGame(); return; }
  if (action === 'inspectorSetup') { closeModal(); showInspectorSetup(); return; }
  if (action === 'collapseRow') { doCollapseBy('row'); return; }
  if (action === 'collapseCol') { doCollapseBy('col'); return; }
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
  renderAll();
}

function showRules() {
  showModal('How to Play',
    `<strong>Killer:</strong> Kill suspects adjacent to you. Eliminate the Inspector or 10 suspects to win.<br><br>
    <strong>Inspector:</strong> Accuse the correct adjacent suspect (the Killer's identity) to win, or Solve by naming both Identity and Disguise.<br><br>
    <strong>Shift:</strong> Move a row or column. You can't undo the opponent's last shift.<br><br>
    <strong>Exonerate:</strong> Place evidence on a suspect, learn if the Killer is adjacent.<br><br>
    <strong>Collapse:</strong> Shrink the board by removing dead suspects.`,
    [{ label: 'Got it', action: 'closeModal' }]
  );
}

// ===================================================
//  RESET
// ===================================================
function resetGame() {
  document.getElementById('win-overlay').classList.add('hidden');
  document.getElementById('modal').classList.add('hidden');
  const gs = document.getElementById('game-screen');
  gs.style.display = 'none';
  gs.classList.remove('active');
  document.getElementById('role-screen').classList.remove('active');
  document.getElementById('title-screen').classList.add('active');
}

</script>
