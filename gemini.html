<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOIR: iPad Edition</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --accent-red: #8b0000;
            --accent-blue: #2b506e;
            --border-color: #444;
        }

        /* Prevent scrolling on the whole page to keep buttons fixed */
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* Overlay for Pass and Play */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            text-align: center;
        }

        .overlay-btn {
            padding: 20px 40px;
            font-size: 24px;
            background: white;
            color: black;
            border: none;
            border-radius: 8px;
            margin-top: 20px;
        }

        header {
            background: #000;
            padding: 10px;
            text-align: center;
            border-bottom: 2px solid var(--border-color);
            flex-shrink: 0;
        }

        /* The Board area now shrinks to fit the screen */
        #game-container {
            flex-grow: 1;
            overflow-y: auto; /* Allows scrolling inside the board if needed */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            width: 100%;
            max-width: 500px; /* Reduced size for iPad height */
        }

        .card {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            aspect-ratio: 2/3;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.75rem;
            text-align: center;
            border-radius: 4px;
            padding: 2px;
            font-weight: bold;
        }

        .card.deceased {
            background: #000;
            color: var(--accent-red);
            border-color: var(--accent-red);
            text-decoration: line-through;
        }

        .card.exonerated {
            border-color: #ffd700;
            box-shadow: inset 0 0 5px #ffd700;
        }

        /* Footer area for buttons - always visible */
        #controls {
            background: #000;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto;
            gap: 10px;
            padding: 15px;
            border-top: 2px solid var(--border-color);
            flex-shrink: 0;
        }

        button {
            padding: 18px 10px;
            font-size: 1rem;
            background: #333;
            color: white;
            border: 1px solid #666;
            border-radius: 8px;
            text-transform: uppercase;
        }

        button.active {
            background: var(--accent-blue);
            border-color: white;
        }

        #btn-peek {
            grid-column: span 2;
            background: #444;
        }

        #private-info {
            position: absolute;
            bottom: 180px;
            left: 10%;
            right: 10%;
            background: rgba(0,0,0,0.95);
            border: 2px solid white;
            padding: 20px;
            display: none;
            z-index: 1500;
            text-align: center;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 id="overlay-msg">NOIR</h1>
        <p id="sub-msg">Hand the device to the Killer</p>
        <button class="overlay-btn" onclick="hideOverlay()">START TURN</button>
    </div>

    <header>
        <div id="status-bar">KILLER'S TURN</div>
        <div id="score">Kills: 0/10</div>
    </header>

    <div id="game-container">
        <div id="board"></div>
    </div>

    <div id="private-info"></div>

    <div id="controls">
        <button id="btn-peek" onmousedown="showPrivate()" onmouseup="hidePrivate()" ontouchstart="showPrivate()" ontouchend="hidePrivate()">HOLD TO PEEK YOUR ID</button>
        <button id="btn-shift" onclick="setMode('shift')">SHIFT ROW</button>
        <button id="btn-action" onclick="setMode('action')">KILL</button>
        <button id="btn-special" onclick="handleSpecial()">DISGUISE</button>
        <button onclick="endTurnManual()">END TURN</button>
    </div>

<script>
    const SUSPECTS = [
        "Alyss", "Barrin", "Clive", "Deidre", "Ernest", 
        "Franklin", "Geneva", "Horatio", "Irma", "Julian", 
        "Kristoph", "Linus", "Marion", "Neil", "Ophelia", 
        "Phoebe", "Quinton", "Ryan", "Simon", "Trevor", 
        "Ulysses", "Vladimir", "Wesley", "Yvonne", "Zachary"
    ];

    let game = {
        board: [],
        killer: { id: "", disguise: "", kills: 0 },
        inspector: { id: "", hand: [] },
        turn: 'killer',
        mode: 'none'
    };

    function init() {
        let deck = [...SUSPECTS].sort(() => Math.random() - 0.5);
        game.board = deck.map(name => ({ name, status: 'alive', exonerated: false }));

        let evidence = [...SUSPECTS].sort(() => Math.random() - 0.5);
        game.killer.id = evidence.pop();
        game.killer.disguise = evidence.pop();
        
        game.inspector.id = evidence.pop();
        game.inspector.hand = [evidence.pop(), evidence.pop(), evidence.pop()];

        render();
    }

    function render() {
        const boardEl = document.getElementById('board');
        boardEl.innerHTML = '';
        
        game.board.forEach((card, i) => {
            const div = document.createElement('div');
            div.className = `card ${card.status === 'dead' ? 'deceased' : ''} ${card.exonerated ? 'exonerated' : ''}`;
            div.innerText = card.name;
            div.onclick = () => handleCardClick(i);
            boardEl.appendChild(div);
        });

        document.getElementById('status-bar').innerText = `${game.turn.toUpperCase()}'S TURN`;
        document.getElementById('score').innerText = `Kills: ${game.killer.kills}/10`;
        document.getElementById('btn-action').innerText = game.turn === 'killer' ? 'KILL' : 'ACCUSE';
        document.getElementById('btn-special').innerText = game.turn === 'killer' ? 'DISGUISE' : 'EXONERATE';
    }

    function setMode(m) {
        game.mode = m;
        document.querySelectorAll('#controls button').forEach(b => b.classList.remove('active'));
        if(m === 'shift') document.getElementById('btn-shift').classList.add('active');
        if(m === 'action') document.getElementById('btn-action').classList.add('active');
    }

    function handleCardClick(index) {
        if (game.mode === 'shift') {
            performShift(index);
        } else if (game.mode === 'action') {
            if (game.turn === 'killer') performKill(index);
            else performAccuse(index);
        }
    }

    function performShift(index) {
        const row = Math.floor(index / 5);
        let rowData = game.board.slice(row * 5, (row * 5) + 5);
        let last = rowData.pop();
        rowData.unshift(last);
        game.board.splice(row * 5, 5, ...rowData);
        endTurn();
    }

    function performKill(index) {
        const target = game.board[index];
        if (target.status === 'dead') return;
        target.status = 'dead';
        game.killer.kills++;
        if (target.name === game.inspector.id) {
            alert("KILLER WINS! Inspector is dead.");
            location.reload();
        }
        endTurn();
    }

    function performAccuse(index) {
        if (game.board[index].name === game.killer.id) {
            alert("INSPECTOR WINS! Killer caught.");
            location.reload();
        } else {
            alert("WRONG! That was an innocent suspect.");
            endTurn();
        }
    }

    function handleSpecial() {
        if (game.turn === 'killer') {
            let temp = game.killer.id;
            game.killer.id = game.killer.disguise;
            game.killer.disguise = temp;
            alert("Identity Swapped.");
        } else {
            if(game.inspector.hand.length > 0) {
                let name = game.inspector.hand.pop();
                let card = game.board.find(c => c.name === name);
                if(card) card.exonerated = true;
                alert(name + " is now proven innocent.");
            }
        }
        endTurn();
    }

    function showPrivate() {
        const el = document.getElementById('private-info');
        el.style.display = 'block';
        if (game.turn === 'killer') {
            el.innerHTML = `YOU ARE: ${game.killer.id}<br>DISGUISE: ${game.killer.disguise}`;
        } else {
            el.innerHTML = `YOU ARE: ${game.inspector.id}<br>EVIDENCE: ${game.inspector.hand.join(', ')}`;
        }
    }

    function hidePrivate() {
        document.getElementById('private-info').style.display = 'none';
    }

    function endTurn() {
        game.turn = game.turn === 'killer' ? 'inspector' : 'killer';
        game.mode = 'none';
        render();
        showOverlay("TURN OVER", `Pass the iPad to the ${game.turn.toUpperCase()}`);
    }

    function endTurnManual() { endTurn(); }

    function showOverlay(title, msg) {
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('overlay-msg').innerText = title;
        document.getElementById('sub-msg').innerText = msg;
    }

    function hideOverlay() {
        document.getElementById('overlay').style.display = 'none';
    }

    init();
</script>
</body>
</html>
